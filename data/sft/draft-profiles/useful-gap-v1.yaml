content:
  greeting:
    - key: muraho
      phrase: Muraho
      meaning: hello.
      usage: It is a general polite greeting.
      exchange: "A: `Muraho.`\nB: `Muraho. Amakuru?`"
    - key: mwaramutse
      phrase: Mwaramutse
      meaning: good morning.
      usage: It is used as a morning greeting.
      exchange: "A: `Mwaramutse.`\nB: `Mwaramutse. Amakuru?`"
    - key: mwiriwe
      phrase: Mwiriwe
      meaning: good afternoon or good evening.
      usage: It is used later in the day; a fluent speaker should confirm local timing.
      exchange: "A: `Mwiriwe.`\nB: `Mwiriwe. Amakuru?`"
    - key: amakuru
      phrase: Amakuru?
      meaning: how are you?
      usage: It asks how someone is doing in a common conversational way.
      exchange: "A: `Amakuru?`\nB: `Ni meza, murakoze.`"
    - key: ni-meza
      phrase: Ni meza
      meaning: I am fine or things are good.
      usage: It is a simple answer to `Amakuru?`.
      exchange: "A: `Amakuru?`\nB: `Ni meza. Nawe?`"
    - key: murakoze
      phrase: Murakoze
      meaning: thank you.
      usage: It expresses thanks politely.
      exchange: "A: `Dore igitabo.`\nB: `Murakoze.`"
    - key: murakoze-cyane
      phrase: Murakoze cyane
      meaning: thank you very much.
      usage: It adds emphasis to a polite thank-you.
      exchange: "A: `Ndagufasha.`\nB: `Murakoze cyane.`"
    - key: nitwa
      phrase: Nitwa ...
      meaning: my name is ...
      usage: It is a beginner pattern for introducing your name.
      exchange: "A: `Witwa nde?`\nB: `Nitwa Aline.`"
    - key: witwa-nde
      phrase: Witwa nde?
      meaning: what is your name?
      usage: It asks another person for their name.
      exchange: "A: `Witwa nde?`\nB: `Nitwa Eric.`"
    - key: tuzabonana
      phrase: Tuzabonana
      meaning: see you later.
      usage: It is a simple leave-taking phrase.
      exchange: "A: `Tuzabonana.`\nB: `Yego, tuzabonana.`"
    - key: ijoro-ryiza
      phrase: Ijoro ryiza
      meaning: good night.
      usage: It is used when wishing someone a good night.
      exchange: "A: `Ijoro ryiza.`\nB: `Ijoro ryiza.`"

