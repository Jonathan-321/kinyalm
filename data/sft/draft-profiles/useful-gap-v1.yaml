  dialogue:
    - key: greet-neighbor
      scenario: greeting a neighbor
      dialogue: "A: `Muraho.`\nB: `Muraho. Amakuru?`\nA: `Ni meza, murakoze.`"
      english_note: The speakers greet each other and say they are well.
    - key: introduce-classmates
      scenario: two classmates introducing themselves
      dialogue: "A: `Muraho. Nitwa Aline.`\nB: `Muraho Aline. Nitwa Eric.`"
      english_note: Each classmate gives a name.
    - key: ask-name
      scenario: asking a new learner's name
      dialogue: "A: `Witwa nde?`\nB: `Nitwa Keza.`\nA: `Muraho Keza.`"
      english_note: One speaker asks for and repeats the learner's name.
    - key: ask-how
      scenario: asking how a friend is doing
      dialogue: "A: `Amakuru?`\nB: `Ni meza. Nawe?`\nA: `Ni meza.`"
      english_note: The friends ask how each other is doing.
    - key: ask-repeat
      scenario: asking a teacher to repeat
      dialogue: "Learner: `Subiramo, ndakwinginze.`\nTeacher: `Yego, ndabisubiramo.`"
      english_note: The learner politely asks for repetition.
    - key: speak-slowly
      scenario: asking someone to speak slowly
      dialogue: "Learner: `Vuga buhoro, ndakwinginze.`\nTutor: `Yego, ndavuga buhoro.`"
      english_note: The learner asks the tutor to slow down.
    - key: ask-meaning
      scenario: asking what a phrase means
      dialogue: "Learner: `Ibi bisobanura iki?`\nTutor: `Reka mbisobanure.`"
      english_note: The learner asks for an explanation.
    - key: ask-help
      scenario: asking for help in class
      dialogue: "Learner: `Nkeneye ubufasha.`\nTutor: `Ni iki ushaka gusobanukirwa?`"
      english_note: The learner asks for help and the tutor asks what is unclear.
    - key: find-school
      scenario: asking where the school is
      dialogue: "A: `Ishuri riri he?`\nB: `Ishuri riri hano.`"
      english_note: One speaker asks for the school's location.
    - key: find-market
      scenario: asking where the market is
      dialogue: "A: `Isoko riri he?`\nB: `Isoko riri hano.`"
      english_note: One speaker asks for the market's location.
    - key: request-water
      scenario: asking for water
      dialogue: "A: `Ndashaka amazi.`\nB: `Yego. Dore amazi.`\nA: `Murakoze.`"
      english_note: One speaker requests water and says thank you.
    - key: request-food
      scenario: asking for food
      dialogue: "A: `Ndashonje. Ndashaka ibiryo.`\nB: `Yego.`"
      english_note: The speaker says they are hungry and asks for food.
    - key: find-hospital
      scenario: asking where the hospital is
      dialogue: "A: `Ibitaro biri he?`\nB: `Ibitaro biri hano.`"
      english_note: One speaker asks for the hospital's location.
    - key: meet-friend
      scenario: introducing a friend
      dialogue: "A: `Uyu ni inshuti yanjye.`\nB: `Muraho.`\nFriend: `Muraho.`"
      english_note: A speaker introduces a friend.
    - key: say-goodbye
      scenario: saying goodbye after class
      dialogue: "Learner: `Murakoze, mwarimu.`\nTeacher: `Tuzabonana.`\nLearner: `Tuzabonana.`"
      english_note: The learner thanks the teacher and they say goodbye.
    - key: check-understanding
      scenario: checking whether a learner understands
      dialogue: "Tutor: `Urumva?`\nLearner: `Oya, sinumva.`\nTutor: `Reka nongere mbisobanure.`"
      english_note: The learner says they do not understand, so the tutor offers another explanation.
    - key: apologize
      scenario: apologizing and continuing politely
      dialogue: "A: `Mbabarira.`\nB: `Yego.`\nA: `Murakoze.`"
      english_note: One speaker apologizes and then gives thanks.

