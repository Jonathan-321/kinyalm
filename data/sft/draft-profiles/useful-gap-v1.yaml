  grammar-explanation:
    - key: nitwa-name
      focus: Nitwa Aline
      explanation: "`Nitwa` is a common beginner form for giving the speaker's name."
      example: Nitwa Eric.
      caution: Do not treat it as the general form for every sentence with "I am."
    - key: witwa-nde
      focus: Witwa nde?
      explanation: "This is the conventional beginner question for asking a person's name."
      example: Witwa nde? Nitwa Aline.
      caution: A fluent speaker should confirm tone and context.
    - key: ndi-role
      focus: Ndi umunyeshuri
      explanation: "`Ndi` can introduce a role or identity, as in `I am a student`."
      example: Ndi umwarimu.
      caution: The form used for giving a name is usually taught separately as `Nitwa`.
    - key: ndiga-action
      focus: Ndiga Ikinyarwanda
      explanation: "`Ndiga` expresses that the speaker studies or is learning."
      example: Ndiga Ikinyarwanda.
      caution: Exact tense and aspect explanations need fluent-speaker review.
    - key: nkunda-preference
      focus: Nkunda Ikinyarwanda
      explanation: "`Nkunda` can express that the speaker likes something."
      example: Nkunda Ikinyarwanda.
      caution: Keep the first lesson at the whole-phrase level.
    - key: mfite-possession
      focus: Mfite igitabo
      explanation: "`Mfite` is useful for simple possession statements meaning `I have`."
      example: Mfite ikibazo.
      caution: Do not explain every internal morpheme until a reviewer confirms it.
    - key: ndashaka-want
      focus: Ndashaka amazi
      explanation: "`Ndashaka` is a useful beginner form for saying `I want`."
      example: Ndashaka ibiryo.
      caution: The complement may change when another verb follows.
    - key: nkeneye-need
      focus: Nkeneye ubufasha
      explanation: "`Nkeneye` is a beginner form for saying that the speaker needs something."
      example: Nkeneye ubufasha.
      caution: Review longer constructions separately.
    - key: ngiye-direction
      focus: Ngiye ku isoko
      explanation: "`Ngiye` can express that the speaker is going somewhere."
      example: Ngiye ku kazi.
      caution: Location markers such as `ku`, `mu`, and `i` depend on the place phrase.
    - key: ntuye-location
      focus: Ntuye i Kigali
      explanation: "`Ntuye` is used here to say where the speaker lives."
      example: Ntuye i Kigali.
      caution: Place-name marking should be checked across different locations.
    - key: sinumva-negative
      focus: Sinumva
      explanation: "`Sinumva` is a complete beginner phrase meaning `I do not understand`."
      example: Sinumva. Subiramo, ndakwinginze.
      caution: Avoid deriving a universal negative rule from one form.
    - key: simbizi-negative
      focus: Simbizi
      explanation: "`Simbizi` means `I do not know it` or `I do not know that`."
      example: Simbizi.
      caution: Context determines what the object refers to.
    - key: riri-he-location
      focus: Ishuri riri he?
      explanation: "The question asks where the school is; `he` contributes the `where` meaning."
      example: Isoko riri he?
      caution: The agreement form before `he` changes with the noun.
    - key: uyu-demonstrative
      focus: Uyu ni inshuti yanjye
      explanation: "`Uyu` points to the person introduced in this example."
      example: Uyu ni inshuti yanjye.
      caution: Demonstratives change across noun classes, so do not generalize this form to every noun.
    - key: umwana-abana
      focus: umwana and abana
      explanation: "`umwana` is singular `child`, while `abana` is plural `children`."
      example: Umwana arasoma. Abana barasoma.
      caution: Treat the pair as a pattern example, not a complete noun-class rule.
    - key: umunyeshuri-abanyeshuri
      focus: umunyeshuri and abanyeshuri
      explanation: "`umunyeshuri` means `student`, and `abanyeshuri` means `students`."
      example: Umunyeshuri ariga. Abanyeshuri bariga.
      caution: Subject agreement also changes and needs explicit review.
    - key: umwarimu-abarimu
      focus: umwarimu and abarimu
      explanation: "`umwarimu` means `teacher`, and `abarimu` means `teachers`."
      example: Umwarimu arigisha. Abarimu barigisha.
      caution: A reviewer should confirm the full agreement explanation.
    - key: igitabo-ibitabo
      focus: igitabo and ibitabo
      explanation: "`igitabo` means `book`, and `ibitabo` means `books`."
      example: Igitabo kiri hano. Ibitabo biri hano.
      caution: Use this as one noun-pair example rather than a universal plural recipe.
    - key: ishuri-amashuri
      focus: ishuri and amashuri
      explanation: "`ishuri` means `school`, and `amashuri` means `schools`."
      example: Ishuri riri hano. Amashuri ari hano.
      caution: Noun and agreement changes should be taught together after review.
    - key: ikibazo-ibibazo
      focus: ikibazo and ibibazo
      explanation: "`ikibazo` means `question` or `problem`, and `ibibazo` is plural."
      example: Mfite ikibazo. Mfite ibibazo.
      caution: The best English meaning depends on context.
    - key: umunsi-iminsi
      focus: umunsi and iminsi
      explanation: "`umunsi` means `day`, and `iminsi` means `days`."
      example: Umunsi umwe. Iminsi ibiri.
      caution: Number agreement deserves a separate reviewed lesson.
    - key: command-fungura
      focus: Fungura igitabo
      explanation: "`Fungura` is used here as a direct command meaning `open`."
      example: Fungura igitabo.
      caution: Politeness and plural commands need separate context.
    - key: please-ndakwinginze
      focus: ndakwinginze
      explanation: "`ndakwinginze` adds a polite `please` to a request."
      example: Subiramo, ndakwinginze.
      caution: Register and alternatives should be confirmed by fluent speakers.

  sentence-correction:
    - key: name-agreement
      incorrect: Jyewe yitwa Aline.
      corrected: Nitwa Aline.
      reason: Use the common beginner pattern `Nitwa ...` to give your own name.
    - key: learning-form
      incorrect: Ndi kwiga Ikinyarwanda.
      corrected: Ndiga Ikinyarwanda.
      reason: The compact beginner form `Ndiga` expresses `I study` or `I am learning` here.
    - key: want-form
      incorrect: Ndi nshaka amazi.
      corrected: Ndashaka amazi.
      reason: Use `Ndashaka` as the beginner form for `I want`.
    - key: have-form
      incorrect: Ndi mfite ikibazo.
      corrected: Mfite ikibazo.
      reason: "`Mfite` already expresses `I have` in this sentence."
    - key: ask-name
      incorrect: Witwa iki?
      corrected: Witwa nde?
      reason: "`Witwa nde?` is the conventional beginner question for a person's name."
    - key: school-location
      incorrect: Ishuri iri he?
      corrected: Ishuri riri he?
      reason: The location form should agree with `ishuri` in this example.
    - key: book-location
      incorrect: Igitabo ari hano.
      corrected: Igitabo kiri hano.
      reason: Use `kiri` with `igitabo` in this location statement.
    - key: teacher-agreement
      incorrect: Umwarimu barigisha.
      corrected: Umwarimu arigisha.
      reason: The singular subject `umwarimu` takes the singular agreement shown here.
    - key: students-agreement
      incorrect: Abanyeshuri ariga.
      corrected: Abanyeshuri bariga.
      reason: The plural subject `abanyeshuri` takes the plural agreement shown here.
    - key: child-agreement
      incorrect: Umwana barasoma.
      corrected: Umwana arasoma.
      reason: The singular subject `umwana` takes the singular agreement shown here.
    - key: hello-thanks
      incorrect: Murakoze hello.
      corrected: Muraho.
      reason: "`Muraho` is a greeting; `Murakoze` means `thank you`."
    - key: thanks-hello
      incorrect: Muraho thank you.
      corrected: Murakoze.
      reason: "`Murakoze` expresses thanks; `Muraho` means `hello`."
    - key: role-not-name
      incorrect: Nitwa umunyeshuri.
      corrected: Ndi umunyeshuri.
      reason: Use `Ndi` for the role `I am a student`; reserve `Nitwa` for a name.
    - key: name-introduction
      incorrect: Ndi Aline. (when introducing a name)
      corrected: Nitwa Aline.
      reason: "`Nitwa Aline` is the clearer beginner pattern for `My name is Aline`."
    - key: mixed-explain
      incorrect: Ndashaka explain iri jambo.
      corrected: Sobanura iri jambo, ndakwinginze.
      reason: Use a complete Kinyarwanda classroom request instead of inserting the English verb.
    - key: mixed-repeat
      incorrect: Please subiramo slowly.
      corrected: Subiramo buhoro, ndakwinginze.
      reason: This keeps the request in Kinyarwanda and uses the beginner words for `slowly` and `please`.
    - key: book-plural-agreement
      incorrect: Igitabo biri ku meza.
      corrected: Igitabo kiri ku meza.
      reason: "`Igitabo` is singular in this sentence, so use the singular agreement shown here."
    - key: children-agreement
      incorrect: Abana arasoma.
      corrected: Abana barasoma.
      reason: "`Abana` is plural and takes the plural agreement shown here."
    - key: doctor-agreement
      incorrect: Umuganga bari ku bitaro.
      corrected: Umuganga ari ku bitaro.
      reason: "`Umuganga` is singular in this sentence."
    - key: market-location
      incorrect: Isoko iri he?
      corrected: Isoko riri he?
      reason: Use the agreement form shown with `isoko` in this location question.
    - key: kigali-location
      incorrect: Ntuye Kigali.
      corrected: Ntuye i Kigali.
      reason: The place name takes `i` in this beginner location pattern.
    - key: market-direction
      incorrect: Ngiye isoko.
      corrected: Ngiye ku isoko.
      reason: Use `ku` in this beginner phrase for going to the market.
    - key: thirst-request
      incorrect: Mfite inyota amazi.
      corrected: Mfite inyota. Ndashaka amazi.
      reason: Separate `I am thirsty` from the follow-up request `I want water`.

